<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Card - Sambar Vada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="recipe-card">
        <div class="recipe-header">
            <span class="tag">Medium</span>
            <h2>Sambar Vada🍛</h2>
            <p>Crispy, deep-fried lentil fritters soaked in hot, tangy lentil stew.</p>
        </div>

        <div class="recipe-section">
            <h3>Ingredients</h3>
            <ul class="interactive-list">
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">1 cup urad dal (soaked for 4 hours)</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">1 cup toor dal (for sambar)</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">2 tbsp sambar powder</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">Mixed vegetables (drumsticks, shallots, carrots🥕)</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">Oil for deep frying</span>
                    </label>
                </li>
            </ul>
        </div>

        <div class="recipe-section">
            <h3>Instructions</h3>
            <ol class="interactive-list steps">
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">Pressure cook the toor dal until completely soft and mash it smoothly.</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">Simmer the vegetables with tamarind extract, sambar powder, and salt until tender.</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">Mix the mashed dal into the vegetable broth and let it come to a rolling boil.</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">Grind the soaked urad dal in a mixer, adding ice-cold water in tiny splashes to keep the batter thick and fluffy.</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">Whisk the batter rigorously with your hands for 2 minutes to incorporate air for softer vadas.</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">Wet your hands, shape a small portion of batter into a ball, and make a hole in the center with your thumb.</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">Slide the shaped batter carefully into hot oil and fry on medium heat until golden brown and crisp.</span>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="item-text">Drop the freshly fried vadas directly into the warm sambar and let them soak for 10 minutes before serving.</span>
                    </label>
                </li>
            </ol>
        </div>
    </div>

</body>
</html>
